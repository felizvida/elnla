<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">ELNLA project banner</title>
  <desc id="desc">A clean scientific banner for ELNLA, a LabArchives GOV backup and read-only notebook viewer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f3d3a"/>
      <stop offset="0.56" stop-color="#155e56"/>
      <stop offset="1" stop-color="#e7f3ee"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#062a27" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1400" height="420" fill="url(#bg)"/>
  <path d="M0 325 C190 275 320 344 503 290 C670 240 760 206 930 236 C1114 268 1245 205 1400 144 L1400 420 L0 420 Z" fill="#f4faf7" opacity="0.94"/>
